name: akrab_pharma
description: A duty pharmacies tracking application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.16.0
  geolocator: ^14.0.3
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo.png
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
